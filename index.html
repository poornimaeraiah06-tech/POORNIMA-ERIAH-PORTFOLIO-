<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Interior Designer | Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2c2c2c;
            --accent: #a89471; /* Sophisticated Champagne/Gold */
            --light: #f9f9f9;
            --text: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links a {
            margin-left: 2rem;
            text-decoration: none;
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Hero Section */
        header {
            height: 80vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), 
                        url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
        }

        .hero-content h1 {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .hero-content p {
            font-size: 1.2rem;
            max-width: 600px;
            border-left: 3px solid var(--accent);
            padding-left: 20px;
        }

        /* Portfolio Grid */
        .section-title {
            text-align: center;
            padding: 4rem 0 2rem;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            padding: 0 5% 5rem;
        }

        .project-card {
            position: relative;
            overflow: hidden;
            height: 450px;
            cursor: pointer;
        }

        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .project-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            padding: 2rem;
            transform: translateY(100%);
            transition: transform 0.4s ease;
        }

        .project-card:hover img {
            transform: scale(1.1);
        }
